<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PerreoLand — Mobile grooming booking & management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FBF6F2;--blush:#F4DEE4;--blush-soft:#FBEDF0;
  --mauve:#A8688A;--mauve-deep:#823F61;--burgundy:#43202F;
  --ink:#3C2530;--muted:#9A7C87;--gold:#C2A24F;
  --line:#EAD7DC;--white:#FFFFFF;--ok:#4F8A6B;--warn:#B07A1E;--bad:#C0556B;
  --shadow:0 12px 40px -18px rgba(67,32,47,.35);
  --shadow-sm:0 4px 18px -10px rgba(67,32,47,.30);
  --r:18px;--r-sm:12px;--r-pill:999px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
h1,h2,h3,.display{font-family:'Fraunces',Georgia,serif;font-weight:500;letter-spacing:-.01em;color:var(--burgundy)}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:16px}
::selection{background:var(--blush);color:var(--burgundy)}
a{color:var(--mauve-deep)}

.demo-bar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:8px;padding:10px 14px calc(10px + env(safe-area-inset-top));background:rgba(251,246,242,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.demo-bar .pl{font-family:'Fraunces';font-weight:600;font-size:15px;color:var(--mauve-deep);margin-right:auto;display:flex;align-items:center;gap:6px}
.demo-bar .pl small{font-family:'Inter';font-weight:600;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.lang-btn{display:flex;align-items:center;gap:5px;background:var(--blush-soft);border:1px solid var(--line);border-radius:var(--r-pill);padding:7px 12px;font-size:12px;font-weight:700;color:var(--mauve-deep)}
.seg{display:flex;background:var(--blush-soft);border:1px solid var(--line);border-radius:var(--r-pill);padding:3px}
.seg button{padding:7px 15px;border-radius:var(--r-pill);font-size:13px;font-weight:600;color:var(--mauve-deep);transition:.2s}
.seg button.on{background:var(--burgundy);color:#fff;box-shadow:var(--shadow-sm)}

.wrap{max-width:1080px;margin:0 auto;padding:22px 18px 70px}
.view{display:none;animation:fade .35s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

#login{position:fixed;inset:0;z-index:200;background:linear-gradient(160deg,#2c1420,#43202F 55%,#5c2c44);display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .4s}
#login.hide{display:none}
.login-card{width:100%;max-width:380px;text-align:center}
.login-logo{font-family:'Fraunces';font-size:42px;color:#fff;letter-spacing:-.02em;margin-bottom:4px}
.login-logo .paw{color:var(--gold)}
.login-sub{color:#E7C9D4;font-size:13.5px;margin-bottom:30px}
.login-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:var(--r);padding:26px 22px;backdrop-filter:blur(8px)}
.login-box .field{margin-bottom:14px;text-align:left}
.login-box label{display:block;font-size:12px;color:#E7C9D4;font-weight:600;margin-bottom:6px}
.login-box input{width:100%;padding:13px 15px;border:1.5px solid rgba(255,255,255,.18);border-radius:var(--r-sm);background:rgba(255,255,255,.08);color:#fff;outline:none}
.login-box input::placeholder{color:#c9a9b6}
.login-box input:focus{border-color:var(--gold)}
.login-btn{width:100%;padding:14px;border-radius:var(--r-pill);background:var(--gold);color:#3a2e10;font-weight:700;font-size:15px;margin-top:6px}
.login-alt{margin-top:18px;font-size:13px;color:#E7C9D4}
.login-alt button{color:#fff;font-weight:600;text-decoration:underline}
.login-feat{display:flex;gap:18px;justify-content:center;margin-top:26px;color:#d9b9c6;font-size:11.5px;flex-wrap:wrap}
.login-feat span{display:flex;align-items:center;gap:5px}
.login-lang{margin-top:22px}.login-lang button{color:#E7C9D4;font-size:12px;font-weight:600;padding:4px 8px;text-decoration:underline}

.brand{display:flex;align-items:center;gap:13px;margin:8px 0 24px}
.brand .mark{width:50px;height:50px;border-radius:16px;flex:none;background:linear-gradient(150deg,var(--mauve),var(--mauve-deep));display:grid;place-items:center;color:#fff;font-family:'Fraunces';font-size:24px;box-shadow:var(--shadow-sm)}
.brand .name{font-family:'Fraunces';font-size:22px;color:var(--burgundy);line-height:1.1}
.brand .tag{font-size:12.5px;color:var(--muted)}

.steps{display:flex;gap:6px;margin-bottom:22px}
.steps .s{flex:1;height:4px;border-radius:4px;background:var(--line)}
.steps .s.done{background:var(--gold)}.steps .s.cur{background:var(--mauve)}
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow)}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mauve);font-weight:600;margin-bottom:6px}
.step h2{font-size:25px;margin:0 0 4px}
.step .sub{color:var(--muted);font-size:14px;margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--burgundy);margin-bottom:7px}
.field .opt-note{color:var(--muted);font-weight:400}
.input,select.input,textarea.input{width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:var(--r-sm);background:var(--cream);color:var(--ink);transition:.15s;outline:none}
.input:focus{border-color:var(--mauve);background:#fff;box-shadow:0 0 0 4px var(--blush-soft)}
textarea.input{resize:vertical;min-height:74px}

.combo{position:relative}
.combo .results{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:20;background:#fff;border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:var(--shadow);max-height:240px;overflow:auto;display:none}
.combo .results.show{display:block}
.combo .results button{display:flex;width:100%;justify-content:space-between;align-items:center;padding:11px 15px;text-align:left;border-bottom:1px solid var(--blush-soft);font-size:14.5px;color:var(--ink)}
.combo .results button:hover,.combo .results button.hl{background:var(--blush-soft)}
.combo .results button:last-child{border-bottom:none}
.combo .results .sz{font-size:11px;color:var(--muted);background:var(--blush-soft);padding:3px 9px;border-radius:var(--r-pill)}
.empty-res{padding:14px 15px;color:var(--muted);font-size:13.5px}

.opt-grid{display:grid;gap:10px}
.opt{display:flex;align-items:center;gap:13px;padding:14px 16px;border:1.5px solid var(--line);border-radius:var(--r-sm);background:var(--cream);text-align:left;width:100%;transition:.15s}
.opt:hover{border-color:var(--mauve)}
.opt.sel{border-color:var(--mauve);background:var(--blush-soft);box-shadow:0 0 0 3px var(--blush-soft)}
.opt .ic{width:38px;height:38px;border-radius:11px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;font-size:19px;flex:none}
.opt .tl{font-weight:600;color:var(--burgundy);font-size:15px}
.opt .ds{font-size:12.5px;color:var(--muted)}
.opt .pr{margin-left:auto;font-weight:700;color:var(--mauve-deep);font-family:'Fraunces'}
.opt .dur{font-size:11px;color:var(--muted);display:block;text-align:right}

.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:9px}
.slot{padding:11px 8px;text-align:center;border:1.5px solid var(--line);border-radius:var(--r-sm);background:var(--cream);font-size:14px;font-weight:600;color:var(--burgundy);transition:.15s}
.slot:hover{border-color:var(--mauve)}.slot.sel{background:var(--burgundy);color:#fff;border-color:var(--burgundy)}
.slot.off{opacity:.32;cursor:not-allowed;text-decoration:line-through}
.row{display:flex;gap:12px}.row>*{flex:1}
.check-line{display:flex;align-items:center;gap:11px;padding:13px 15px;border:1.5px solid var(--line);border-radius:var(--r-sm);background:var(--cream);cursor:pointer;margin-bottom:10px}
.check-line input{width:20px;height:20px;accent-color:var(--mauve);flex:none}
.check-line .t{font-size:14px;font-weight:600;color:var(--burgundy)}
.check-line .d{font-size:12px;color:var(--muted)}
.sub-inline{margin-top:10px;display:none}.sub-inline.show{display:block}

.actions{display:flex;gap:10px;margin-top:22px}
.btn{padding:14px 22px;border-radius:var(--r-pill);font-weight:600;font-size:15px;transition:.18s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--burgundy);color:#fff;flex:1;box-shadow:var(--shadow-sm)}
.btn-primary:hover{background:#341824}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--mauve-deep);border:1.5px solid var(--line)}
.btn-gold{background:var(--gold);color:#3a2e10}
.btn-sm{padding:9px 15px;font-size:13px}
.btn-danger{background:#fff;color:var(--bad);border:1.5px solid #F0CDD4}

.summary{background:var(--blush-soft);border-radius:var(--r-sm);padding:16px 18px;margin-bottom:18px}
.summary .ln{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:1px dashed var(--line);gap:12px}
.summary .ln:last-child{border:none}
.summary .ln .k{color:var(--muted);flex:none}.summary .ln .v{font-weight:600;color:var(--burgundy);text-align:right}
.summary .total{display:flex;justify-content:space-between;align-items:baseline;margin-top:10px;padding-top:12px;border-top:1.5px solid var(--line)}
.summary .total .t{font-family:'Fraunces';font-size:26px;color:var(--mauve-deep)}
.deposit-tag{font-size:12.5px;color:var(--warn);margin-top:6px;font-weight:600}

.done-state{text-align:center;padding:18px 8px}
.done-state .check{width:70px;height:70px;border-radius:50%;background:var(--ok);color:#fff;display:grid;place-items:center;font-size:34px;margin:0 auto 16px;box-shadow:0 10px 30px -10px rgba(79,138,107,.6)}

.biz-head{display:flex;align-items:flex-end;justify-content:space-between;margin:6px 0 20px;flex-wrap:wrap;gap:12px}
.biz-head h1{font-size:30px;margin:0}
.biz-head .meta{font-size:13px;color:var(--muted)}
.biz-head .pl-badge{font-family:'Fraunces';font-size:13px;color:var(--mauve);border:1px solid var(--line);padding:6px 13px;border-radius:var(--r-pill);background:#fff}
.tabs{display:flex;gap:4px;background:var(--blush-soft);border:1px solid var(--line);border-radius:var(--r-pill);padding:4px;margin-bottom:22px;overflow:auto}
.tabs button{padding:9px 15px;border-radius:var(--r-pill);font-size:13.5px;font-weight:600;color:var(--mauve-deep);white-space:nowrap;transition:.18s}
.tabs button.on{background:#fff;color:var(--burgundy);box-shadow:var(--shadow-sm)}
.panel{display:none}.panel.on{display:block;animation:fade .3s ease}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:13px;margin-bottom:22px}
.stat{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:17px 18px;box-shadow:var(--shadow-sm)}
.stat .k{font-size:12px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;font-weight:600}
.stat .v{font-family:'Fraunces';font-size:29px;color:var(--burgundy);margin-top:4px;line-height:1}
.stat .d{font-size:12px;margin-top:5px;font-weight:600}
.stat .up{color:var(--ok)}.stat .gold{color:var(--gold)}

.sec-title{font-size:15px;font-family:'Fraunces';color:var(--burgundy);margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.sec-title:first-child{margin-top:0}
.sec-title::after{content:"";flex:1;height:1px;background:var(--line)}
.view-toggle{display:flex;gap:4px;background:var(--blush-soft);border:1px solid var(--line);border-radius:var(--r-pill);padding:3px;margin-bottom:16px;width:fit-content}
.view-toggle button{padding:7px 16px;border-radius:var(--r-pill);font-size:13px;font-weight:600;color:var(--mauve-deep)}
.view-toggle button.on{background:#fff;color:var(--burgundy);box-shadow:var(--shadow-sm)}

.appt{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 16px 14px 20px;margin-bottom:10px;box-shadow:var(--shadow-sm);text-align:left;width:100%;transition:.15s;position:relative;overflow:hidden}
.appt .vanstrip{position:absolute;left:0;top:0;bottom:0;width:5px}
.appt:hover{border-color:var(--mauve);transform:translateY(-1px)}
.appt .when{text-align:center;flex:none;width:56px}
.appt .when .d{font-family:'Fraunces';font-size:21px;color:var(--mauve-deep);line-height:1}
.appt .when .m{font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:.08em}
.appt .when .h{font-size:12px;color:var(--burgundy);font-weight:600;margin-top:3px}
.appt .info{flex:1;min-width:0}
.appt .info .pet{font-weight:700;color:var(--burgundy);font-size:15px}
.appt .info .det{font-size:12.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.appt .info .vantag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;margin-top:3px;color:var(--mauve-deep)}
.appt .info .vantag .vd{width:8px;height:8px;border-radius:50%}
.appt .rgt{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex:none}
.badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--r-pill)}
.b-conf{background:#E9F3ED;color:var(--ok)}.b-pend{background:#FBF0E1;color:var(--warn)}
.b-done{background:#EEE7F0;color:var(--mauve-deep)}.b-paid{background:#E9F3ED;color:var(--ok)}.b-unpaid{background:#FBE7EB;color:var(--bad)}
.appt .price{font-family:'Fraunces';font-weight:600;color:var(--mauve-deep)}

.van-group{margin-bottom:24px}
.van-group .vg-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.van-group .vg-dot{width:14px;height:14px;border-radius:50%;flex:none}
.van-group .vg-name{font-family:'Fraunces';font-size:17px;color:var(--burgundy)}
.van-group .vg-meta{font-size:12px;color:var(--muted);margin-left:auto;text-align:right}

.chart{display:flex;align-items:flex-end;gap:10px;height:170px;padding:14px 4px 0;margin-top:6px}
.chart .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
.chart .bar .fill{width:100%;max-width:42px;border-radius:8px 8px 4px 4px;background:linear-gradient(180deg,var(--mauve),var(--mauve-deep));transition:height .6s cubic-bezier(.2,.8,.2,1)}
.chart .bar .lab{font-size:11px;color:var(--muted);font-weight:600}
.chart .bar .val{font-size:10.5px;color:var(--mauve-deep);font-weight:700}

.fin-rows{margin-top:8px}
.fin-row{display:flex;align-items:center;justify-content:space-between;padding:12px 2px;border-bottom:1px solid var(--blush-soft)}
.fin-row .lft{display:flex;align-items:center;gap:11px}
.fin-row .dot{width:10px;height:10px;border-radius:50%;flex:none}
.fin-row .nm{font-size:14px;color:var(--burgundy);font-weight:500}
.fin-row .sub{font-size:12px;color:var(--muted)}
.fin-row .amt{font-weight:700;font-family:'Fraunces'}
.amt.in{color:var(--ok)}.amt.out{color:var(--bad)}

.cli-card{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow-sm);text-align:left;width:100%;transition:.15s}
.cli-card:hover{border-color:var(--mauve);transform:translateY(-1px)}
.cli-avatar{width:46px;height:46px;border-radius:14px;flex:none;display:grid;place-items:center;font-size:22px;background:var(--blush-soft);border:1px solid var(--line)}
.cli-card .ci{flex:1;min-width:0}
.cli-card .cn{font-weight:700;color:var(--burgundy);font-size:15px}
.cli-card .cd{font-size:12.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cli-card .cv{text-align:right;flex:none}
.cli-card .cv .tot{font-family:'Fraunces';font-weight:600;color:var(--mauve-deep)}
.cli-card .cv .vis{font-size:11px;color:var(--muted)}

.cfg-card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.cfg-card h3{font-size:17px;margin:0 0 4px}
.cfg-card p.hint{font-size:13px;color:var(--muted);margin:0 0 16px}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.chip{display:inline-flex;align-items:center;gap:8px;background:var(--blush-soft);border:1px solid var(--line);color:var(--mauve-deep);padding:8px 13px;border-radius:var(--r-pill);font-size:13px;font-weight:600}
.chip button{color:var(--mauve);font-size:15px;line-height:1;opacity:.7}.chip button:hover{opacity:1}
.add-inline{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.add-inline .input{flex:1;min-width:120px}.add-inline .btn{padding:13px 18px;flex:none}
.svc-edit{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--blush-soft)}
.svc-edit .nm{flex:1;font-weight:600;color:var(--burgundy);font-size:14px}
.svc-edit .price-in{width:84px}.svc-edit .dur-in{width:70px}
.swatches{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:42px;height:42px;border-radius:12px;cursor:pointer;border:3px solid transparent;transition:.15s}
.sw.on{border-color:var(--burgundy);transform:scale(1.06)}
.hours-grid{display:grid;gap:8px}
.hour-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--blush-soft)}
.hour-row .day{width:108px;font-weight:600;color:var(--burgundy);font-size:13.5px}
.toggle{width:44px;height:26px;border-radius:var(--r-pill);background:var(--line);position:relative;transition:.2s;flex:none;cursor:pointer}
.toggle.on{background:var(--mauve)}
.toggle::after{content:"";position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle.on::after{left:21px}
.hour-row .times{display:flex;gap:6px;align-items:center;color:var(--muted);font-size:13px}
.hour-row .times input{width:78px;padding:7px 9px}
.hour-row.off .times{opacity:.35;pointer-events:none}
.setting-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 0;border-bottom:1px solid var(--blush-soft)}
.setting-row:last-child{border:none}
.setting-row .sl{flex:1}
.setting-row .st{font-weight:600;color:var(--burgundy);font-size:14px}
.setting-row .ss{font-size:12px;color:var(--muted)}
.setting-row .num{width:88px}
.staff-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--blush-soft)}
.staff-row .av{width:38px;height:38px;border-radius:11px;background:var(--blush-soft);display:grid;place-items:center;font-weight:700;color:var(--mauve-deep);flex:none}
.staff-row .sn{flex:1;font-weight:600;color:var(--burgundy);font-size:14px}
.staff-row .comm{width:74px}
.van-row{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--blush-soft);flex-wrap:wrap}
.van-row .vcolor{width:34px;height:34px;border-radius:10px;flex:none;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);cursor:pointer;position:relative;overflow:hidden}
.van-row .vcolor input{position:absolute;inset:-6px;opacity:0;cursor:pointer}
.van-row .vn{flex:1;min-width:110px;font-weight:600;color:var(--burgundy);font-size:14px}
.van-row .vsel{min-width:120px;flex:1}
.van-row .vx{color:var(--mauve);padding:4px 8px;font-size:16px}
.reminder-preview{background:var(--blush-soft);border-radius:var(--r-sm);padding:14px 16px;font-size:13px;color:var(--ink);line-height:1.6;margin-top:12px}
.reminder-preview .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;margin-bottom:6px}

.modal-bg{position:fixed;inset:0;z-index:150;background:rgba(43,20,32,.5);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;padding:0}
.modal-bg.show{display:flex;animation:fade .25s}
.modal{background:var(--cream);width:100%;max-width:520px;max-height:92vh;overflow:auto;border-radius:22px 22px 0 0;padding:8px 20px calc(24px + env(safe-area-inset-bottom));box-shadow:var(--shadow);animation:slideUp .3s cubic-bezier(.2,.8,.2,1)}
@keyframes slideUp{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.modal .grab{width:42px;height:5px;border-radius:5px;background:var(--line);margin:8px auto 14px}
.modal-head{display:flex;align-items:flex-start;gap:13px;margin-bottom:18px}
.modal-head .av{width:54px;height:54px;border-radius:16px;background:linear-gradient(150deg,var(--mauve),var(--mauve-deep));display:grid;place-items:center;font-size:26px;flex:none;overflow:hidden}
.modal-head .av img{width:100%;height:100%;object-fit:cover}
.photo-up{display:flex;align-items:center;gap:14px}
.photo-up .pbox{width:80px;height:80px;border-radius:18px;border:2px dashed var(--line);background:var(--cream);display:grid;place-items:center;cursor:pointer;overflow:hidden;flex:none;transition:.15s}
.photo-up .pbox:hover{border-color:var(--mauve);background:var(--blush-soft)}
.photo-up .pbox img{width:100%;height:100%;object-fit:cover}
.photo-up .pbox .ic{font-size:28px}
.photo-up .pbox input{display:none}
.photo-up .ptxt{font-size:13px;color:var(--muted)}
.appt .pic{width:42px;height:42px;border-radius:12px;object-fit:cover;flex:none;border:1px solid var(--line)}
.cli-avatar{overflow:hidden}
.cli-avatar img{width:100%;height:100%;object-fit:cover}
.modal-head h2{font-size:23px;margin:0}
.modal-head .mh-sub{font-size:13px;color:var(--muted)}
.modal-head .x{margin-left:auto;font-size:24px;color:var(--muted);line-height:1;padding:4px}
.mrow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.mrow .mi{width:34px;height:34px;border-radius:10px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;font-size:16px;flex:none}
.mrow .mk{font-size:12px;color:var(--muted)}
.mrow .mv{font-weight:600;color:var(--burgundy);font-size:14px}
.mrow a.mv{text-decoration:none}
.mrow .mr{margin-left:auto;text-align:right}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.modal-actions .btn{width:100%}
.modal-actions .full{grid-column:1/-1}
.pet-pill{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:var(--r-pill);padding:6px 13px;font-size:13px;font-weight:600;color:var(--burgundy);margin:4px 6px 4px 0}
.hist-item{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--blush-soft);font-size:13.5px}
.hist-item .hk{color:var(--ink)}.hist-item .hv{color:var(--mauve-deep);font-weight:600}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--burgundy);color:#fff;padding:13px 22px;border-radius:var(--r-pill);font-size:14px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.3s;z-index:300;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.note{font-size:12px;color:var(--muted);text-align:center;margin-top:28px;line-height:1.6}
.note b{color:var(--mauve-deep)}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:40px 20px}

.cal-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.cal-nav{width:38px;height:38px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--mauve-deep);font-size:20px;font-weight:700;flex:none;box-shadow:var(--shadow-sm)}
.cal-nav:hover{border-color:var(--mauve);background:var(--blush-soft)}
.cal-title{font-family:'Fraunces';font-size:20px;color:var(--burgundy);flex:1;text-align:center}
.cal-today{border:1px solid var(--line);background:var(--blush-soft);color:var(--mauve-deep);font-size:12px;font-weight:600;padding:8px 13px;border-radius:var(--r-pill);flex:none}
.cal-today:hover{background:var(--blush)}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
.cal-dow span{text-align:center;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-cell{min-height:106px;border:1px solid var(--line);border-radius:12px;background:#fff;display:flex;flex-direction:column;align-items:stretch;gap:3px;padding:6px 5px 5px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.cal-cell:hover{border-color:var(--mauve);background:var(--blush-soft)}
.cal-cell.empty-day{background:transparent;border:none;cursor:default}
.cal-cell.empty-day:hover{background:transparent}
.cal-cell .dn{font-size:13px;font-weight:600;color:var(--burgundy);line-height:1;align-self:flex-start;width:23px;height:23px;display:grid;place-items:center;border-radius:50%;flex:none}
.cal-cell.today .dn{background:var(--mauve);color:#fff}
.cal-cell.sel{border-color:var(--burgundy);box-shadow:0 0 0 2px var(--burgundy);background:#fff}
.cal-evs{display:flex;flex-direction:column;gap:3px;overflow:hidden}
.cal-ev{display:flex;align-items:center;gap:5px;padding:2px 6px;border-radius:6px;font-size:10.5px;font-weight:600;color:var(--burgundy);line-height:1.3;text-align:left;width:100%;overflow:hidden;border-left:3px solid var(--vc,#ccc)}
.cal-ev:hover{filter:brightness(.96)}
.cal-ev .ed{width:7px;height:7px;border-radius:50%;flex:none}
.cal-ev .et{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-more{font-size:10px;font-weight:700;color:var(--mauve-deep);padding-left:5px;margin-top:1px}
.cal-legend{display:flex;flex-wrap:wrap;gap:12px;margin:16px 0 4px;justify-content:center}
.cal-legend span{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-weight:600}
.cal-legend .ld{width:9px;height:9px;border-radius:50%}
@media(max-width:560px){
 .cal-cell{min-height:80px;border-radius:9px;padding:4px 3px 3px;gap:2px}
 .cal-cell .dn{font-size:11px;width:18px;height:18px}
 .cal-ev{font-size:9px;padding:1px 4px;gap:3px;border-left-width:3px}
 .cal-ev .ed{display:none}
 .cal-ev .etime{display:none}
 .cal-more{font-size:9px;padding-left:2px}
}

@media(max-width:560px){.row{flex-direction:column}.biz-head h1{font-size:25px}.wrap{padding:18px 14px 60px}.modal-actions{grid-template-columns:1fr}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

let FB=false,fbAuth=null,fbDB=null,fbStore=null,fbUser=null,_loading=false,_persistT=null;
function fbInit(){
  try{
    if(typeof firebase==="undefined"||!FIREBASE_CONFIG.apiKey)return false;
    firebase.initializeApp(FIREBASE_CONFIG);
    fbAuth=firebase.auth();fbDB=firebase.firestore();
    try{fbStore=firebase.storage();}catch(e){fbStore=null;}
    fbAuth.onAuthStateChanged(u=>{
      fbUser=u||null;
      if(u){loadBiz(u.uid);}else{document.getElementById("login").classList.remove("hide");}
    });
    return true;
  }catch(e){console.warn("Firebase init:",e);return false;}
}
const BIZ_KEYS=["brand","zones","services","staff","vans","hours","settings","slots","expenses","appointments"];
function withTimeout(p,ms){return Promise.race([p,new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),ms))]);}
async function loadBiz(uid){
  _loading=true;
  // Entrar al panel de inmediato; los datos de la nube llegan después.
  document.getElementById("login").classList.add("hide");
  showView("biz");
  try{
    const snap=await withTimeout(fbDB.collection("businesses").doc(uid).get(),9000);
    if(snap.exists){const d=snap.data();BIZ_KEYS.forEach(k=>{if(d[k]!==undefined)STATE[k]=d[k];});}
    else{STATE.appointments=[];await withTimeout(fbDB.collection("businesses").doc(uid).set(serializeBiz()),9000);}
  }catch(e){console.warn("loadBiz:",e);_loading=false;toast(t("cloud_err"));applyLang();refreshBiz();return;}
  _loading=false;
  applyLang();refreshBiz();
}
function serializeBiz(){const o={updatedAt:Date.now()};BIZ_KEYS.forEach(k=>o[k]=STATE[k]);return o;}
function persist(){
  if(!FB||!fbUser||_loading)return;
  clearTimeout(_persistT);
  _persistT=setTimeout(()=>{fbDB.collection("businesses").doc(fbUser.uid).set(serializeBiz()).catch(e=>console.warn("persist:",e));},800);
}
function uploadPhoto(dataUrl,folder,cb){
  if(!(FB&&fbStore&&fbUser)){cb(dataUrl);return;}
  try{
    const ref=fbStore.ref().child("businesses/"+fbUser.uid+"/"+folder+"/"+Date.now()+".jpg");
    ref.putString(dataUrl,"data_url").then(s=>s.ref.getDownloadURL()).then(u=>cb(u)).catch(e=>{console.warn("upload:",e);cb(dataUrl);});
  }catch(e){cb(dataUrl);}
}
function showLogErr(msg){const e=document.getElementById("logErr");if(!msg){e.style.display="none";return;}e.style.background="rgba(192,85,107,.18)";e.style.borderColor="rgba(192,85,107,.4)";e.style.color="#ffd9e0";e.textContent=msg;e.style.display="block";}
function showLogInfo(msg){const e=document.getElementById("logErr");e.style.background="rgba(79,138,107,.18)";e.style.borderColor="rgba(79,138,107,.4)";e.style.color="#d6f0e0";e.textContent=msg;e.style.display="block";}
function doLogout(){if(FB&&fbAuth){fbAuth.signOut();}else{location.reload();}}
function updateAccountUI(){
  const em=document.getElementById("acctEmail"),st=document.getElementById("acctStatus"),lb=document.getElementById("logoutBtn");
  if(!em)return;
  if(FB&&fbUser){em.textContent=fbUser.email;st.textContent=t("cloud_on");lb.style.display="";}
  else{em.textContent="demo@perreoland.com";st.textContent=t("cloud_off");lb.style.display="none";}
}

function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function money(n){return "$"+Math.round(n).toLocaleString("en-US");}
function loc(){return STATE.lang==="en"?"en-US":"es-ES";}
function fmtDate(iso){return new Date(iso+"T12:00").toLocaleDateString(loc(),{weekday:"short",day:"numeric",month:"short"});}
function svcById(id){return STATE.services.find(s=>s.id===id)||{};}
function vanById(id){return STATE.vans.find(v=>v.id===id)||null;}
function priceFor(svc,size){return Math.round((svc.base||0)*(SIZE_MULT[size]||1));}
function initials(n){return n.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();}
function phoneGen(r){return "+58 41"+(2+Math.floor(r()*6))+"-"+(1000000+Math.floor(r()*8999999));}
function toast(m){const el=document.getElementById("toast");el.textContent=m;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),2400);}
function vanForGroomer(g,r){const m=STATE.vans.filter(v=>v.groomer===g);if(m.length)return m[0].id;return STATE.vans.length?STATE.vans[Math.floor((r?r():Math.random())*STATE.vans.length)].id:null;}

  ];
  const owners=["María González","José Pérez","Ana Rodríguez","Carla Méndez","Luis Díaz"];
  up.forEach((a,i)=>{const sv=svcById(a[3]);const g=grm();STATE.appointments.push({

    addr:mkAddr(),zone:STATE.zones[Math.floor(r()*STATE.zones.length)],when:addDays(a[4]),time:a[5],
    price:priceFor(sv,a[2]),groomer:g,vanId:vanForGroomer(g,r),status:a[6],paid:false,recurring:null});});
  const pets=["Kira","Bruno","Lola","Thor","Maya","Zeus","Canela","Simba","Frida","Duke","Mia","Oso","Chloe","Niko","Pepa","Tobías","Cookie","Balto"];
  const ow2=["Pedro S.","Sofía L.","Diego H.","Valeria C.","Andrés T.","Gaby M.","Rafael O.","Daniela V.","Marco A.","Isabel R."];
  for(let i=0;i<30;i++){
    const day=-(1+Math.floor(r()*41));const b=BREEDS[Math.floor(r()*BREEDS.length)];const sv=STATE.services[Math.floor(r()*STATE.services.length)];const g=grm();
    STATE.appointments.push({id:nid(),pet:pets[i%pets.length],breed:b[0],size:b[1],svc:sv.id,

/* ===== idioma ===== */
function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t(el.dataset.i18n);if(typeof v==="string")el.textContent=v;});
  document.querySelectorAll('[data-ph]').forEach(el=>{el.placeholder=t(el.dataset.ph);});
  document.documentElement.lang=STATE.lang;
  document.getElementById("langBtn").textContent="🌐 "+(STATE.lang==="es"?"EN":"ES");
  document.getElementById("brandTag").textContent=STATE.brand.tag||t("default_tagline");
  document.getElementById("clientNote").innerHTML=t("client_note");
  renderServices();
  if(document.getElementById("view-biz").classList.contains("on"))refreshBiz();else renderZones();
  const s4=document.querySelector('#view-client .step[data-step="4"]');
  if(s4&&s4.style.display!=="none")buildSummary();
}
function setLang(l){STATE.lang=l;applyLang();}
function toggleLang(){setLang(STATE.lang==="es"?"en":"es");}

/* ===== login & views ===== */
function doLogin(target){
  if(target==="client"){document.getElementById("login").classList.add("hide");showView("client");return;}
  if(FB){
    const em=document.getElementById("logEmail").value.trim(),pw=document.getElementById("logPass").value;
    if(!em||!pw){showLogErr(t("err_needCreds"));return;}
    showLogInfo(t("connecting"));
    fbAuth.signInWithEmailAndPassword(em,pw).catch(e=>showLogErr(t("err_auth")+" — "+(e.code||e.message)));
    return;
  }
  document.getElementById("login").classList.add("hide");showView("biz");
}
function doSignup(){
  if(!FB){doLogin();return;}
  const em=document.getElementById("logEmail").value.trim(),pw=document.getElementById("logPass").value;
  if(!em||!pw){showLogErr(t("err_needCreds"));return;}
  showLogInfo(t("connecting"));
  fbAuth.createUserWithEmailAndPassword(em,pw).catch(e=>showLogErr(t("err_signup")+" — "+(e.code||e.message)));
}
function showView(v){
  document.getElementById("view-client").classList.toggle("on",v==="client");
  document.getElementById("view-biz").classList.toggle("on",v==="biz");
  document.getElementById("sw-client").classList.toggle("on",v==="client");
  document.getElementById("sw-biz").classList.toggle("on",v==="biz");
  if(v==="biz")refreshBiz();
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ===== CLIENTE ===== */
function goStep(n){
  if(n===2)renderServices();
  if(n===3){renderZones();buildDateOptions();}
  if(n===4)buildSummary();
  document.querySelectorAll('#view-client .step').forEach(s=>s.style.display=(s.dataset.step==String(n))?"block":"none");
  document.querySelectorAll('.steps .s').forEach(s=>{const i=+s.dataset.s;s.classList.toggle('done',i<n);s.classList.toggle('cur',i===n);});
  window.scrollTo({top:0,behavior:"smooth"});
}
const bi=document.getElementById("breedInput"),br=document.getElementById("breedResults");
let hlIndex=-1,curMatches=[];
bi.addEventListener("input",()=>{
  const q=bi.value.trim().toLowerCase();hlIndex=-1;
  if(!q){br.classList.remove("show");checkStep1();return;}
  curMatches=BREEDS.filter(b=>b[0].toLowerCase().includes(q)).slice(0,8);
  if(!curMatches.length){br.innerHTML='<div class="empty-res">—</div>';br.classList.add("show");checkStep1();return;}
  br.innerHTML=curMatches.map((b,i)=>'<button onclick="pickBreed('+i+')"><span>'+b[0]+'</span><span class="sz">'+sizeLabel(b[1])+'</span></button>').join("");
  br.classList.add("show");checkStep1();
});
bi.addEventListener("keydown",e=>{
  if(!br.classList.contains("show"))return;const btns=br.querySelectorAll("button");if(!btns.length)return;
  if(e.key==="ArrowDown"){e.preventDefault();hlIndex=Math.min(hlIndex+1,btns.length-1);}
  else if(e.key==="ArrowUp"){e.preventDefault();hlIndex=Math.max(hlIndex-1,0);}
  else if(e.key==="Enter"&&hlIndex>=0){e.preventDefault();pickBreed(hlIndex);return;}else return;
  btns.forEach((b,i)=>b.classList.toggle("hl",i===hlIndex));
});
function pickBreed(i){const b=curMatches[i];if(!b)return;bi.value=b[0];SEL.breed=b[0];SEL.size=b[1];document.getElementById("petSize").value=b[1];br.classList.remove("show");checkStep1();}
document.addEventListener("click",e=>{if(!e.target.closest(".combo"))br.classList.remove("show");});
document.getElementById("petName").addEventListener("input",checkStep1);
document.getElementById("petSize").addEventListener("change",e=>SEL.size=e.target.value);
function checkStep1(){SEL.pet=document.getElementById("petName").value.trim();SEL.breed=bi.value.trim();document.getElementById("next1").disabled=!(SEL.pet&&SEL.breed&&SEL.photo);}

function buildDateOptions(){
  const sel=document.getElementById("dateSelect");const opts=[];
  for(let i=0;i<14;i++){const d=new Date();d.setDate(d.getDate()+i);const dow=(d.getDay()+6)%7;
    if(STATE.hours[dow].on){const iso=d.toISOString().slice(0,10);opts.push('<option value="'+iso+'">'+d.toLocaleDateString(loc(),{weekday:"long",day:"numeric",month:"long"})+'</option>');}}
  sel.innerHTML=opts.join("");SEL.date=sel.value;buildSlots();
}
document.getElementById("dateSelect").addEventListener("change",e=>{SEL.date=e.target.value;buildSlots();});
function fmtTime(hhmm){let[h,m]=hhmm.split(":").map(Number);const ap=h<12?"AM":"PM";let h12=h%12;if(h12===0)h12=12;return h12+":"+String(m).padStart(2,"0")+" "+ap;}
function buildSlots(){
  const taken=STATE.appointments.filter(a=>a.when===SEL.date).map(a=>a.time);
  const slots=STATE.slots.slice().sort();
  if(SEL.time&&!slots.includes(SEL.time))SEL.time=null;
  let html="";
  slots.forEach(tt=>{const off=taken.includes(tt);
    html+='<button class="slot '+(off?'off':'')+' '+(SEL.time===tt?'sel':'')+'" '+(off?'disabled':'onclick="pickSlot(\''+tt+'\')"')+'>'+fmtTime(tt)+'</button>';});
  document.getElementById("slotList").innerHTML=html||'<div class="empty" style="padding:14px">'+t("no_slots")+'</div>';
  validateStep3();
}
function pickSlot(tt){SEL.time=tt;buildSlots();}
function toggleRecur(){document.getElementById("recurOpts").classList.toggle("show",document.getElementById("recurChk").checked);}
function validateStep3(){document.getElementById("next3").disabled=!(SEL.zone&&SEL.addr&&SEL.date&&SEL.time);}

function buildSummary(){
  const s=svcById(SEL.svc);const p=priceFor(s,SEL.size);SEL.price=p;
  const dep=STATE.settings.deposit;
  const recurTxt=document.getElementById("recurChk").checked?t("sum_yesEvery",{n:document.getElementById("recurEvery").value}):t("sum_no");
  document.getElementById("bookSummary").innerHTML=
    '<div class="ln"><span class="k">'+t("sum_pet")+'</span><span class="v">'+SEL.pet+' · '+SEL.breed+'</span></div>'+
    '<div class="ln"><span class="k">'+t("sum_service")+'</span><span class="v">'+(s.name||'')+' ('+sizeLabel(SEL.size)+')</span></div>'+
    '<div class="ln"><span class="k">'+t("sum_address")+'</span><span class="v">'+SEL.addr+'</span></div>'+
    '<div class="ln"><span class="k">'+t("sum_date")+'</span><span class="v">'+fmtDate(SEL.date)+' · '+fmtTime(SEL.time)+'</span></div>'+
    '<div class="ln"><span class="k">'+t("sum_recurring")+'</span><span class="v">'+recurTxt+'</span></div>'+
    '<div class="total"><span class="k">'+t("sum_total")+'</span><span class="t">'+money(p)+'</span></div>'+
    (dep>0?'<div class="deposit-tag">'+t("deposit_text",{amt:money(dep)})+'</div>':'');
}
function confirmBooking(){
  const name=document.getElementById("ownerName").value.trim();
  const phone=document.getElementById("ownerPhone").value.trim();
  const email=document.getElementById("ownerEmail").value.trim();
  if(!name||!phone){toast(t("t_needNamePhone"));return;}
  const groomer=(STATE.staff[0]||{}).name||"—";const vanId=vanForGroomer(groomer);
  const recurOn=document.getElementById("recurChk").checked;const every=+document.getElementById("recurEvery").value;
  const base={pet:SEL.pet,breed:SEL.breed,size:SEL.size,svc:SEL.svc,owner:name,phone:phone,email:email,
    addr:SEL.addr,zone:SEL.zone,price:SEL.price,groomer:groomer,vanId:vanId,recurring:recurOn?every:null,photo:SEL.photo};
  STATE.appointments.push(Object.assign({id:nid(),when:SEL.date,time:SEL.time,status:"pend",paid:false},base));
  if(recurOn){const b0=new Date(SEL.date+"T12:00");
    for(let k=1;k<=3;k++){const d=new Date(b0);d.setDate(d.getDate()+every*7*k);
      STATE.appointments.push(Object.assign({id:nid(),when:d.toISOString().slice(0,10),time:SEL.time,status:"pend",paid:false},base));}}
  document.getElementById("doneMsg").innerHTML=t("done_msg",{date:fmtDate(SEL.date),time:fmtTime(SEL.time),extra:recurOn?t("done_extra_recur"):""});
  persist();
  goStep("done");document.querySelectorAll('.steps .s').forEach(s=>{s.classList.add('done');s.classList.remove('cur');});
}
function resetBooking(){
  Object.assign(SEL,{pet:"",breed:"",size:"Mediano",notes:"",svc:null,zone:STATE.zones[0],addr:"",date:null,time:null,recur:null,photo:""});
  ["petName","breedInput","petNotes","bookAddr","ownerName","ownerPhone","ownerEmail"].forEach(id=>document.getElementById(id).value="");
  const im=document.getElementById("petPhotoImg");im.style.display="none";im.src="";document.getElementById("petPhotoIc").style.display="block";
  document.getElementById("petSize").value="Mediano";document.getElementById("recurChk").checked=false;document.getElementById("recurOpts").classList.remove("show");
  document.getElementById("next1").disabled=true;document.getElementById("next2").disabled=true;goStep(1);
}

function refreshBiz(){
  document.getElementById("bizName").textContent=STATE.brand.name;
  document.getElementById("todayLabel").textContent=new Date().toLocaleDateString(loc(),{weekday:"long",day:"numeric",month:"long"});
  renderDash();renderAllAppts();renderCalendar();renderClients();renderFinance();renderConfig();
  updateAccountUI();persist();
}
function clientsFromAppts(){
  const m={};
  STATE.appointments.forEach(a=>{const k=a.owner;if(!m[k])m[k]={owner:a.owner,phone:a.phone,addr:a.addr,zone:a.zone,pets:{},visits:0,spent:0,last:"",appts:[]};
    const c=m[k];c.appts.push(a);c.pets[a.pet]=a.breed;if(a.status==="done"){c.visits++;c.spent+=a.price;}if(a.when>c.last)c.last=a.when;});
  return Object.values(m).sort((a,b)=>b.spent-a.spent);
}
function renderDash(){
  const today=addDays(0);
  const todays=STATE.appointments.filter(a=>a.when===today);
  const week=STATE.appointments.filter(a=>[...Array(7)].map((_,i)=>addDays(i)).includes(a.when));
  const monthRev=STATE.appointments.filter(a=>a.when<=today&&a.when>=addDays(-30)).reduce((s,a)=>s+a.price,0);
  document.getElementById("stToday").textContent=todays.length;
  document.getElementById("stTodayD").textContent=todays.length?("▲ "+money(todays.reduce((s,a)=>s+a.price,0))+" "+t("st_booked")):t("st_noAppts");
  document.getElementById("stWeek").textContent=week.length;
  document.getElementById("stRev").textContent=money(monthRev);
  document.getElementById("stClients").textContent=clientsFromAppts().length;
  const up=STATE.appointments.filter(a=>a.when>=today).sort((a,b)=>(a.when+a.time).localeCompare(b.when+b.time)).slice(0,6);
  document.getElementById("upcomingList").innerHTML=up.length?up.map(apptRow).join(""):'<div class="empty">'+t("no_upcoming")+'</div>';
}
function badges(a){
  const st=a.status==="conf"?'<span class="badge b-conf">'+t("b_confirmed")+'</span>':a.status==="done"?'<span class="badge b-done">'+t("b_completed")+'</span>':'<span class="badge b-pend">'+t("b_pending")+'</span>';
  const pay=a.paid?'<span class="badge b-paid">'+t("b_paid")+'</span>':'<span class="badge b-unpaid">'+t("b_unpaid")+'</span>';
  return st+pay;
}
function apptRow(a){
  const d=new Date(a.when+"T12:00");const s=svcById(a.svc);const v=vanById(a.vanId);
  const vc=v?v.color:"#ddd";
  const vtag=v?'<span class="vantag"><span class="vd" style="background:'+v.color+'"></span>'+v.name+'</span>':'';
  const pic=a.photo?'<img class="pic" src="'+a.photo+'" alt="">':'';
  return '<button class="appt" onclick="openAppt(\''+a.id+'\')"><span class="vanstrip" style="background:'+vc+'"></span><div class="when"><div class="d">'+d.getDate()+'</div><div class="m">'+d.toLocaleDateString(loc(),{month:"short"})+'</div><div class="h">'+a.time+'</div></div>'+pic+
    '<div class="info"><div class="pet">'+a.pet+' <span style="color:var(--muted);font-weight:400">· '+a.breed+'</span></div><div class="det">'+(s.icon||'')+' '+(s.name||a.svc)+' · '+a.owner+' · '+(a.zone||'')+'</div>'+vtag+'</div>'+

/* ===== calendario ===== */
function calISO(y,m,d){return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");}
function hexToRgba(hex,a){const n=parseInt(hex.slice(1),16);return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}
function renderCalendar(){
  const cal=STATE.cal;if(!cal)return;
  const first=new Date(cal.y,cal.m,1);
  const mt=first.toLocaleDateString(loc(),{month:"long",year:"numeric"});
  document.getElementById("calTitle").textContent=mt.charAt(0).toUpperCase()+mt.slice(1);
  document.getElementById("calTodayBtn").textContent=t("cal_today");
  document.getElementById("calDow").innerHTML=t("cal_dow").map(d=>'<span>'+d+'</span>').join("");
  const startDow=(first.getDay()+6)%7;
  const daysInMonth=new Date(cal.y,cal.m+1,0).getDate();
  const today=addDays(0);
  let cells="";
  for(let i=0;i<startDow;i++)cells+='<div class="cal-cell empty-day"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const iso=calISO(cal.y,cal.m,d);
    const dayAppts=STATE.appointments.filter(a=>a.when===iso).sort((a,b)=>a.time.localeCompare(b.time));
    const cls=["cal-cell"];if(iso===today)cls.push("today");if(iso===cal.sel)cls.push("sel");
    let ev="";
    dayAppts.slice(0,3).forEach(a=>{
      const v=vanById(a.vanId);const c=v?v.color:"#b9a7ae";
      ev+='<button class="cal-ev" style="--vc:'+c+';background:'+hexToRgba(c,0.14)+'" onclick="event.stopPropagation();openAppt(\''+a.id+'\')"><span class="ed" style="background:'+c+'"></span><span class="et"><span class="etime">'+a.time+' </span>'+a.pet+'</span></button>';
    });
    if(dayAppts.length>3)ev+='<span class="cal-more">+'+(dayAppts.length-3)+'</span>';
    cells+='<div class="'+cls.join(" ")+'" onclick="calSelect(\''+iso+'\')"><span class="dn">'+d+'</span><div class="cal-evs">'+ev+'</div></div>';
  }
  document.getElementById("calGrid").innerHTML=cells;
  document.getElementById("calLegend").innerHTML=STATE.vans.map(v=>'<span><span class="ld" style="background:'+v.color+'"></span>'+v.name+'</span>').join("");
  renderCalDay();
}
function renderCalDay(){
  const iso=STATE.cal.sel;const d=new Date(iso+"T12:00");
  document.getElementById("calDayLabel").textContent=t("cal_dayAppts",{d:d.toLocaleDateString(loc(),{weekday:"long",day:"numeric",month:"long"})});
  const ab=document.getElementById("calAddBtn");if(ab)ab.textContent=t("cal_new");
  const list=STATE.appointments.filter(a=>a.when===iso).sort((a,b)=>a.time.localeCompare(b.time));
  document.getElementById("calDayList").innerHTML=list.length?list.map(apptRow).join(""):'<div class="empty">'+t("cal_noDay")+'</div>';
}
function calSelect(iso){STATE.cal.sel=iso;renderCalendar();}
function calShift(delta){
  let m=STATE.cal.m+delta,y=STATE.cal.y;
  if(m<0){m=11;y--;}if(m>11){m=0;y++;}
  STATE.cal.y=y;STATE.cal.m=m;
  const sd=new Date(STATE.cal.sel+"T12:00");
  if(sd.getFullYear()!==y||sd.getMonth()!==m)STATE.cal.sel=calISO(y,m,1);
  renderCalendar();
}
function calGoToday(){const today=addDays(0);const d=new Date(today+"T12:00");STATE.cal.y=d.getFullYear();STATE.cal.m=d.getMonth();STATE.cal.sel=today;renderCalendar();}

function renderFinance(){
  const today=addDays(0);
  const month=STATE.appointments.filter(a=>a.when<=today&&a.when>=addDays(-30));
  const income=month.reduce((s,a)=>s+a.price,0);
  const comm={};let commTotal=0;
  month.filter(a=>a.status==="done").forEach(a=>{const g=STATE.staff.find(x=>x.name===a.groomer);if(g){const c=a.price*g.comm/100;comm[g.name]=(comm[g.name]||0)+c;commTotal+=c;}});
  const exp=STATE.expenses.reduce((s,e)=>s+e.amt,0);
  const out=exp+commTotal;const net=income-out;const margin=income?Math.round(net/income*100):0;
  document.getElementById("finIn").textContent=money(income);
  document.getElementById("finOut").textContent=money(out);
  document.getElementById("finNet").textContent=money(net);
  const mEl=document.getElementById("finMargin");mEl.textContent=(net>=0?"▲ ":"▼ ")+margin+"% "+t("fin_margin");mEl.style.color=net>=0?"var(--ok)":"var(--bad)";
  const weeks=[0,0,0,0,0,0];
  STATE.appointments.forEach(a=>{const diff=Math.floor((new Date(today)-new Date(a.when))/86400000);if(diff>=0&&diff<42)weeks[5-Math.floor(diff/7)]+=a.price;});
  const max=Math.max(...weeks,1);
  document.getElementById("finChart").innerHTML=weeks.map((v,i)=>'<div class="bar"><span class="val">'+money(v)+'</span><div class="fill" style="height:'+Math.round(v/max*100)+'%"></div><span class="lab">S'+(i+1)+'</span></div>').join("");
  const by={};month.forEach(a=>{by[a.svc]=(by[a.svc]||0)+a.price;});
  const cols=["#A8688A","#C2A24F","#823F61","#D08CA6"];
  document.getElementById("svcBreakdown").innerHTML=Object.entries(by).sort((a,b)=>b[1]-a[1]).map(([id,v],i)=>{
    const sv=svcById(id);const cnt=month.filter(a=>a.svc===id).length;
    return '<div class="fin-row"><div class="lft"><span class="dot" style="background:'+cols[i%4]+'"></span><div><div class="nm">'+(sv.name||id)+'</div><div class="sub">'+cnt+' '+(cnt===1?t("fin_apptOne"):t("fin_apptMany"))+'</div></div></div><span class="amt in">'+money(v)+'</span></div>';
  }).join("");
  document.getElementById("commRows").innerHTML=Object.entries(comm).map(([n,v])=>{const g=STATE.staff.find(x=>x.name===n);
    return '<div class="fin-row"><div class="lft"><span class="dot" style="background:var(--mauve)"></span><div><div class="nm">'+n+'</div><div class="sub">'+(g?g.comm:0)+'% '+t("commission")+'</div></div></div><span class="amt out">−'+money(v)+'</span></div>';}).join("")||'<p class="hint">'+t("fin_noComm")+'</p>';
  document.getElementById("expenseRows").innerHTML=STATE.expenses.map(e=>'<div class="fin-row"><div class="lft"><span class="dot" style="background:var(--bad)"></span><div class="nm">'+e.name+'</div></div><span class="amt out">−'+money(e.amt)+'</span></div>').join("")||'<p class="hint">'+t("fin_noExp")+'</p>';
}
function addExpense(){
  const n=document.getElementById("expName").value.trim();const a=parseFloat(document.getElementById("expAmt").value);
  if(!n||!a||a<=0){toast(t("t_needExp"));return;}
  STATE.expenses.push({name:n,amt:a});document.getElementById("expName").value="";document.getElementById("expAmt").value="";renderFinance();toast(t("t_expAdded"));
}

  document.getElementById("rmTiming").value=STATE.settings.reminders.timing;
  document.getElementById("rmEmail").classList.toggle("on",STATE.settings.reminders.email);
  document.getElementById("rmSms").classList.toggle("on",STATE.settings.reminders.sms);
  document.getElementById("rmWa").classList.toggle("on",STATE.settings.reminders.whatsapp);
  renderReminderPreview();
}
function renderVanEditor(){
  const zopts=z=>STATE.zones.map(x=>'<option '+(x===z?'selected':'')+'>'+x+'</option>').join("");
  const gopts=g=>STATE.staff.map(x=>'<option '+(x.name===g?'selected':'')+'>'+x.name+'</option>').join("");
  document.getElementById("vanEditor").innerHTML=STATE.vans.map((v,i)=>
    '<div class="van-row"><label class="vcolor" style="background:'+v.color+'"><input type="color" value="'+v.color+'" onchange="setVanColor('+i+',this.value)"></label>'+
    '<input class="input vn" value="'+v.name+'" onchange="setVanName('+i+',this.value)">'+
    '<select class="input vsel" onchange="setVanGroomer('+i+',this.value)">'+gopts(v.groomer)+'</select>'+
    '<select class="input vsel" onchange="setVanZone('+i+',this.value)">'+zopts(v.zone)+'</select>'+
    '<button class="vx" onclick="removeVan('+i+')">✕</button></div>').join("");
}
function renderZoneChips(){document.getElementById("zoneChips").innerHTML=STATE.zones.map((z,i)=>'<span class="chip">'+z+'<button onclick="removeZone('+i+')">×</button></span>').join("");}
function addSlot(){const v=document.getElementById("slotInput").value;if(!v||!/^\d\d:\d\d$/.test(v))return;if(!STATE.slots.includes(v)){STATE.slots.push(v);STATE.slots.sort();renderConfig();toast(t("t_slotAdded"));}}
function removeSlot(s){STATE.slots=STATE.slots.filter(x=>x!==s);renderConfig();}
function addZone(){const v=document.getElementById("zoneInput").value.trim();if(!v)return;STATE.zones.push(v);document.getElementById("zoneInput").value="";renderConfig();renderZones();toast(t("t_zoneAdded"));}
function removeZone(i){STATE.zones.splice(i,1);renderConfig();renderZones();}
function updatePrice(id,v){svcById(id).base=parseFloat(v)||0;toast(t("t_priceUpd"));}
function updateDur(id,v){svcById(id).dur=parseInt(v)||30;}
function addStaff(){const n=document.getElementById("staffName").value.trim();const c=parseFloat(document.getElementById("staffComm").value)||35;if(!n)return;STATE.staff.push({name:n,comm:c});document.getElementById("staffName").value="";document.getElementById("staffComm").value="";renderConfig();toast(t("t_groomerAdded"));}
function removeStaff(i){STATE.staff.splice(i,1);renderConfig();}
function updateComm(i,v){STATE.staff[i].comm=parseFloat(v)||0;renderFinance();}
function addVan(){const n=document.getElementById("vanName").value.trim();if(!n)return;const color=VAN_COLORS[STATE.vans.length%VAN_COLORS.length];STATE.vans.push({id:"v"+Date.now(),name:n,color:color,zone:STATE.zones[0]||"",groomer:(STATE.staff[0]||{}).name||""});document.getElementById("vanName").value="";renderConfig();toast(t("t_vanAdded"));}
function removeVan(i){STATE.vans.splice(i,1);renderConfig();renderAllAppts();}
function setVanColor(i,v){STATE.vans[i].color=v;renderConfig();renderAllAppts();}
function setVanName(i,v){STATE.vans[i].name=v;renderAllAppts();}
function setVanGroomer(i,v){STATE.vans[i].groomer=v;}
function setVanZone(i,v){STATE.vans[i].zone=v;}
function toggleReminder(k,el){STATE.settings.reminders[k]=!STATE.settings.reminders[k];el.classList.toggle("on");renderReminderPreview();}
function renderReminderPreview(){
  STATE.settings.reminders.timing=+document.getElementById("rmTiming").value;
  const ch=[];if(STATE.settings.reminders.email)ch.push("Email");if(STATE.settings.reminders.sms)ch.push("SMS");if(STATE.settings.reminders.whatsapp)ch.push("WhatsApp");
  const via=ch.length?ch.join(" + "):t("rm_none");
  document.getElementById("rmPreview").innerHTML='<div class="lbl">'+t("rm_lbl")+' · '+via+'</div>'+t("rm_msg",{pet:"Luna",time:"10:00",biz:STATE.brand.name});
}
function updateRules(){STATE.settings.deposit=parseFloat(document.getElementById("depAmt").value)||0;STATE.settings.maxDay=parseInt(document.getElementById("maxDay").value)||8;STATE.settings.minWindow=+document.getElementById("minWindow").value;toast(t("t_rulesUpd"));}
function toggleDay(i){STATE.hours[i].on=!STATE.hours[i].on;renderConfig();}
function setHour(i,k,v){STATE.hours[i][k]=v;}
function pickColor(c){STATE.brand.color=c;applyColor(c);renderConfig();}
function applyColor(c){document.documentElement.style.setProperty('--mauve',c);document.getElementById("brandMark").style.background='linear-gradient(150deg,'+c+','+shade(c,-28)+')';}
function shade(hex,amt){let n=parseInt(hex.slice(1),16);let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));return "#"+((r<<16)|(g<<8)|b).toString(16).padStart(6,"0");}
function applyBrand(){STATE.brand.name=document.getElementById("cfgName").value;STATE.brand.tag=document.getElementById("cfgTag").value;
  document.getElementById("brandName").textContent=STATE.brand.name||"Tu negocio";document.getElementById("brandTag").textContent=STATE.brand.tag||t("default_tagline");
  document.getElementById("brandMark").textContent=(STATE.brand.name[0]||"B").toUpperCase();document.getElementById("bizName").textContent=STATE.brand.name||"Tu negocio";
  renderReminderPreview();}

/* init */
const _now=new Date();STATE.cal={y:_now.getFullYear(),m:_now.getMonth(),sel:addDays(0)};
FB=fbInit();
document.getElementById("signupRow").style.display=FB?"":"none";
document.getElementById("clientRow").style.display=FB?"none":"";
document.getElementById("view-biz").addEventListener("change",persist);
document.getElementById("view-biz").addEventListener("click",e=>{if(e.target.closest("button,.toggle,.sw"))persist();});
applyLang();applyColor(STATE.brand.color);refreshBiz();
</script>
</body>
